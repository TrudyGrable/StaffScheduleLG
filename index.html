<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lauren's Support Schedule 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:     #1a3a6b;
  --orange:   #d96a1a;
  --light:    #f0f4f9;
  --white:    #ffffff;
  --text:     #1e2d3d;
  --muted:    #6b7a8d;
  --border:   #d8e2ee;
  --ihss-bg:  #dbeafe; --ihss-tx: #1e3a8a;  --ihss-dot: #3b82f6;
  --fcsn-bg:  #d1fae5; --fcsn-tx: #065f46;  --fcsn-dot: #10b981;
  --mac-bg:   #fef3c7; --mac-tx:  #78350f;  --mac-dot:  #f59e0b;
  --mom-bg:   #ccf5f5; --mom-tx:  #0a6060;  --mom-dot:  #2abfbf;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--light);color:var(--text)}
header{background:var(--navy);color:#fff;padding:1.3rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.hd-title h1{font-family:'Playfair Display',serif;font-size:1.5rem}
.hd-title p{font-size:.82rem;color:#9ab3d0;margin-top:.15rem}
.hd-meta{font-size:.73rem;color:#6e93b8;text-align:right}
.legend{background:var(--white);border-bottom:1px solid var(--border);padding:.6rem 2rem;display:flex;align-items:center;gap:1.3rem;flex-wrap:wrap}
.leg-lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.79rem;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.di{background:var(--ihss-dot)}.df{background:var(--fcsn-dot)}.dm{background:var(--mac-dot)}.dmo{background:var(--mom-dot)}
.mnav{background:var(--white);border-bottom:2px solid var(--border);padding:.5rem 2rem;display:flex;gap:.4rem;overflow-x:auto;position:sticky;top:0;z-index:10}
.mbtn{border:none;cursor:pointer;border-radius:20px;padding:.28rem .82rem;font-size:.79rem;font-weight:600;background:var(--light);color:var(--muted);transition:all .15s;white-space:nowrap;font-family:inherit}
.mbtn:hover{background:#dce8f5;color:var(--navy)}
.mbtn.active{background:var(--navy);color:#fff}
.cal-wrap{padding:1.4rem 2rem 3rem;max-width:1200px;margin:0 auto}
.month-sec{margin-bottom:2.5rem}
.month-h{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:.85rem;border-left:4px solid var(--orange);padding-left:.7rem}
.week-hdr,.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.dh{text-align:center;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:.22rem 0}
.dc{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.42rem .48rem .5rem;min-height:130px;transition:box-shadow .12s}
.dc:hover{box-shadow:0 2px 10px rgba(26,58,107,.1)}
.dc.today{border-color:var(--orange);box-shadow:0 0 0 2px rgba(217,106,26,.18)}
.dc.empty{background:transparent;border-color:transparent;pointer-events:none;min-height:0}
.dc.quiet{background:#fafbfd}
.dnum{font-size:.77rem;font-weight:700;color:var(--navy);margin-bottom:.3rem;display:flex;align-items:center;gap:.3rem}
.today-badge{background:var(--orange);color:#fff;border-radius:10px;padding:.03rem .4rem;font-size:.6rem;font-weight:700;letter-spacing:.04em}
.pill{border-radius:6px;padding:.22rem .44rem .28rem;margin-bottom:.22rem;font-size:.68rem;line-height:1.35}
.pill-time{font-weight:700;display:block;margin-bottom:.08rem}
.pill-who{display:block;padding-left:.55rem;font-weight:600}
.pill-who .lbl{font-weight:400;font-size:.62rem;opacity:.75;margin-left:.22rem;text-transform:uppercase;letter-spacing:.03em}
.pill.ihss{background:var(--ihss-bg);color:var(--ihss-tx)}
.pill.fcsn{background:var(--fcsn-bg);color:var(--fcsn-tx)}
.pill.mac {background:var(--mac-bg); color:var(--mac-tx)}
.pill.mom {background:var(--mom-bg); color:var(--mom-tx)}
.no-shift{font-size:.7rem;color:#c8d2dd;margin-top:.45rem;text-align:center}
@media(max-width:700px){header,.legend,.mnav,.cal-wrap{padding-left:1rem;padding-right:1rem}.dc{min-height:100px}.pill{font-size:.62rem}}
@media(max-width:480px){.week-hdr,.week-row{gap:3px}.dc{padding:.3rem .28rem;min-height:78px}}
</style>
</head>

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const byMonth = {};
for (const day of SCHEDULE) {
  const dt = new Date(day.date + 'T00:00:00');
  const mn = MONTHS[dt.getMonth()];
  if (!byMonth[mn]) byMonth[mn] = [];
  byMonth[mn].push({ dt, shifts: day.shifts });
}

const today = new Date(); today.setHours(0,0,0,0);

// Nav
const nav = document.getElementById('mNav');
Object.keys(byMonth).forEach((mn, i) => {
  const b = document.createElement('button');
  b.className = 'mbtn' + (i === 0 ? ' active' : '');
  b.textContent = mn;
  b.onclick = () => {
    document.querySelectorAll('.mbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('m-'+mn)?.scrollIntoView({ behavior:'smooth', block:'start' });
  };
  nav.appendChild(b);
});

// Calendar
const wrap = document.getElementById('calWrap');
for (const mn of Object.keys(byMonth)) {
  const days = byMonth[mn];
  const year = days[0].dt.getFullYear(), month = days[0].dt.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startDow    = new Date(year, month, 1).getDay();
  const dayMap = {};
  for (const { dt, shifts } of days) dayMap[dt.getDate()] = shifts;

  const sec = document.createElement('div');
  sec.className = 'month-sec'; sec.id = 'm-'+mn;
  const h2 = document.createElement('h2');
  h2.className = 'month-h'; h2.textContent = mn + ' ' + year;
  sec.appendChild(h2);

  const hdr = document.createElement('div'); hdr.className = 'week-hdr';
  DOWS.forEach(d => { const el=document.createElement('div'); el.className='dh'; el.textContent=d; hdr.appendChild(el); });
  sec.appendChild(hdr);

  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
  let row = null;
  for (let i = 0; i < totalCells; i++) {
    if (i % 7 === 0) { row = document.createElement('div'); row.className='week-row'; sec.appendChild(row); }
    const dayNum = i - startDow + 1;
    const cell = document.createElement('div');
    if (i < startDow || dayNum > daysInMonth) {
      cell.className = 'dc empty';
    } else {
      const cellDate = new Date(year, month, dayNum);
      const isToday  = cellDate.getTime() === today.getTime();
      const shifts   = dayMap[dayNum] || [];
      cell.className = 'dc' + (isToday?' today':'') + (shifts.length===0?' quiet':'');
      const numDiv = document.createElement('div'); numDiv.className = 'dnum';
      numDiv.appendChild(document.createTextNode(dayNum));
      if (isToday) { const b=document.createElement('span'); b.className='today-badge'; b.textContent='TODAY'; numDiv.appendChild(b); }
      cell.appendChild(numDiv);

      if (shifts.length === 0) {
        const e=document.createElement('div'); e.className='no-shift'; e.textContent='—'; cell.appendChild(e);
      } else {
        for (const s of shifts) {
          const pill = document.createElement('div');
          pill.className = 'pill ' + s.type;

          // Time row
          const timeRow = document.createElement('span');
          timeRow.className = 'pill-time';
          timeRow.textContent = s.start + '–' + s.end;
          pill.appendChild(timeRow);

          // Name + label row (indented)
          const whoRow = document.createElement('span');
          whoRow.className = 'pill-who';
          whoRow.appendChild(document.createTextNode(s.worker));
          if (s.type !== 'mac' && s.type !== 'mom') {
            const lbl = document.createElement('span');
            lbl.className = 'lbl';
            lbl.textContent = s.type.toUpperCase();
            whoRow.appendChild(lbl);
          }
          pill.appendChild(whoRow);
          cell.appendChild(pill);
        }
      }
    }
    row.appendChild(cell);
  }
  wrap.appendChild(sec);
}

document.getElementById('hdMeta').textContent = 'Generated ' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

// Scroll spy
const obs = new IntersectionObserver(entries => {
  for (const e of entries) {
    if (e.isIntersecting) {
      const mn = e.target.id.replace('m-','');
      document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b.textContent===mn));
    }
  }
}, { rootMargin:'-25% 0px -65% 0px' });
document.querySelectorAll('[id^="m-"]').forEach(el => obs.observe(el));
</script>
